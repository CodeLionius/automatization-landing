name: Deploy to Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI: true
  SKIP_PREFLIGHT_CHECK: true
  GENERATE_SOURCEMAP: false
  # Opt-in to Node.js 24 for all JavaScript actions to resolve deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: Setup Node.js
        uses: actions/setup-node@3922559d819c29d81d003c05e1f7c10c1f6df2cf # v4.3.0
        with:
          node-version: '20' # Upgraded to LTS v20
          cache: 'npm'
        
      - name: Install dependencies
        run: npm install --legacy-peer-deps # Use npm install for better resilience in CI if lockfile drifts
      
      - name: Run security audit
        run: npm audit --audit-level=high || true
      
      - name: Run tests
        # Ensured that failure here actually fails the CI to know when it happens
        run: npm test -- --watchAll=false --passWithNoTests --coverage
      
      - name: TypeScript check
        run: npx tsc --noEmit
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        if: always() # Upload reports even if tests fail (useful for debugging)

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: Setup Node.js
        uses: actions/setup-node@3922559d819c29d81d003c05e1f7c10c1f6df2cf # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
        
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build for production
        run: npm run build
      
      - name: Analyze bundle size
        run: |
          echo "## 📊 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          if [ -d "build/static" ]; then
            find build/static -name "*.js" -o -name "*.css" | while read file; do
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
              gzipped=$(gzip -c "$file" | wc -c)
              echo "| $(basename "$file") | ${size}B | ${gzipped}B |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "Warning: build/static not found" >> $GITHUB_STEP_SUMMARY
          fi
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@b013ec937ede424cdfb06f02279268307040443c # v4.4.2
        with:
          name: production-build
          path: build/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: Run security audit (again)
        run: npm audit --audit-level=high || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: Download build artifacts
        uses: actions/download-artifact@fa91ac899e1964f4342f21af9e5f52f36d4dfeb8 # v4.1.8
        with:
          name: production-build
          path: build/
          
      - name: Simulate Staging Deploy
        run: |
          echo "🚀 Deploying to staging..."
          echo "✅ Staging deployment complete!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: Download build artifacts
        uses: actions/download-artifact@fa91ac899e1964f4342f21af9e5f52f36d4dfeb8 # v4.1.8
        with:
          name: production-build
          path: build/
          
      - name: Deploy to Production
        run: |
          echo "🌟 Deploying to production..."
          echo "✅ Production deployment complete!"

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [test, build, security, deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "🎉 Deployment pipeline completed!"
          echo "Test Result: ${{ needs.test.result }}"
          echo "Build Result: ${{ needs.build.result }}"
          echo "Deploy Result: ${{ needs.deploy-production.result }}"